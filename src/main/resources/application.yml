spring:
  application:
    name: user-service
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://127.0.0.1:5440/user_service_db
    username: ${DB_USER:ETA_DBUser}
    password: ${DB_PASSWORD:devpassword123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: 127.0.0.1
    port: 5680
    username: ${RABBITMQ_USER:service-user}
    password: ${RABBITMQ_PASS:servicepassword}
    virtual-host: universal-host
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3

server:
  port: 8102

minio:
  endpoint: http://127.0.0.1:9020
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:password123}
  bucket: user-service
  base:
    path: http://localhost:9020/user-service/
    avatar: b84e7c4a19b762c769541cd557e97f7f.png
